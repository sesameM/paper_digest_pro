name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # OIDC trusted publishing — no API token needed

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Note: Using OIDC trusted publishing (no password needed)
        # For first-time publication, manually create the project at:
        # https://pypi.org/manage/project/ paperdistillpro/
        # Then configure trusted publisher at:
        # https://docs.pypi.org/trusted-publishers/adding-a-publisher/
        #
        # Trusted publisher configuration:
        # - PyPI project name:  paperdistillpro
        # - Owner:sesameM
        # - Repository name: paper_digest_pro
        # - Workflow: publish.yml
        # - Environment: pypi
