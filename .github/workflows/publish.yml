name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # OIDC trusted publishing — no API token needed

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          password: ${{ secrets.PYPI_API_TOKEN }}
        # NOTE: For first-time publication, you need to:
        # 1. Create a PyPI account
        # 2. Create an API token at https://pypi.org/manage/account/token/
        # 3. Add it as a repository secret named PYPI_API_TOKEN
        # 4. After first publication, configure trusted publishing:
        #    https://docs.pypi.org/trusted-publishers/adding-a-publisher/
